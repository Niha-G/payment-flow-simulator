server:
  port: 8080

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:h2:mem:paymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
    producer:
      properties:
        max.block.ms: 5000
    consumer:
      group-id: payment-processor-group
      auto-offset-reset: earliest
      enable-auto-commit: false   # required since we ack manually in code
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.paymentservice.event"
        spring.json.value.default.type: com.example.paymentservice.event.PaymentStatusEvent
        spring.json.use.type.headers: false

app:
  insights:
    base-url: https://api.anthropic.com
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-haiku-4-5-20251001
    version-header: anthropic-version
    version: "2023-06-01"
  kafka:
    topic:
      payment-events: payment-events-topic
    topics:
      payment-status-events: payment-events-topic   # consumer listens on the producer's topic
